<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Kitchen</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#e07b39;--od:#c4612a;--gr:#5a8a5a;--re:#c0392b;--tx:#3a2a1a;--mu:#8a7a6a;--ca:#fff;--bo:#e8d8c4;--wa:#f5e6d0;--cr:#fdf6ec;--gl:#eaf3ea;--bl:#3a7bd5}
body{font-family:'Segoe UI',sans-serif;background:var(--cr);color:var(--tx);min-height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--or);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff}
#loading h1{font-size:2rem;margin-bottom:10px}
#loading p{font-size:1rem;opacity:0.8}
#loading.hidden{display:none}

/* NAME MODAL */
#nameModal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000}
#nameModal.hidden{display:none}
.modal-box{background:#fff;border-radius:20px;padding:32px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-box h2{color:var(--or);font-size:1.7rem;margin-bottom:8px}
.modal-box p{color:var(--mu);margin-bottom:20px}
.modal-box input{width:100%;padding:12px 14px;border:2px solid var(--bo);border-radius:10px;font-size:1rem;margin-bottom:14px;outline:none;font-family:inherit}
.modal-box input:focus{border-color:var(--or)}

header{background:var(--or);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:1.25rem;font-weight:700}
.user-pill{background:rgba(255,255,255,.25);padding:5px 13px;border-radius:20px;font-size:.83rem;cursor:pointer}
nav{background:#fff;border-bottom:2px solid var(--bo);display:flex;position:sticky;top:53px;z-index:99}
nav button{flex:1;padding:13px 6px;border:none;background:none;font-size:.82rem;font-weight:600;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent}
nav button.a{color:var(--or);border-bottom-color:var(--or)}
main{max-width:680px;margin:0 auto;padding:18px 14px}
.sec{display:none}.sec.a{display:block}

.card{background:#fff;border-radius:13px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);border:1px solid var(--bo)}
.af{background:var(--wa);border-radius:13px;padding:16px;margin-bottom:18px;border:1px solid var(--bo)}
.af h3{margin-bottom:12px;color:var(--od);font-size:.93rem;font-weight:700}
.fr{display:flex;flex-direction:column;gap:9px}
.fr input,.fr textarea{padding:9px 13px;border:1.5px solid var(--bo);border-radius:9px;font-size:.92rem;background:#fff;outline:none;font-family:inherit}
.fr input:focus,.fr textarea:focus{border-color:var(--or)}
.fr textarea{resize:vertical;min-height:75px}
.btn{background:var(--or);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;font-size:.92rem}
.btn:active{background:var(--od)}
.bsm{padding:5px 11px;border-radius:7px;border:none;font-size:.8rem;font-weight:600;cursor:pointer}
.bg{background:var(--gr);color:#fff}
.bx{background:var(--bo);color:var(--mu)}
.st{font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--tx)}
.tag{background:var(--wa);padding:2px 9px;border-radius:20px;font-size:.76rem;color:var(--od);font-weight:600}
.xb{background:none;border:none;color:#ccc;cursor:pointer;padding:2px 5px;border-radius:5px;font-size:.95rem;flex-shrink:0}
.xb:active{color:var(--re)}
.emp{text-align:center;padding:36px 16px;color:var(--mu)}
.emp span{font-size:2.8rem;display:block;margin-bottom:10px}

/* IMPORT */
.ib{background:linear-gradient(135deg,#fff8f3,#fdf0e0);border:2px dashed var(--or);border-radius:13px;padding:16px;margin-bottom:18px}
.ib h3{color:var(--od);margin-bottom:10px;font-size:.93rem;font-weight:700}
.ir{display:flex;gap:8px;flex-wrap:wrap}
.ir input{flex:1;min-width:160px;padding:9px 13px;border:1.5px solid var(--bo);border-radius:9px;font-size:.88rem;outline:none;font-family:inherit;background:#fff}
.ir input:focus{border-color:var(--or)}
.is{margin-top:9px;padding:8px 12px;border-radius:8px;font-size:.83rem;display:none}
.is.s{display:block}
.is.ld{background:#fff8e1;color:#b07d00;border:1px solid #ffe082}
.is.ok{background:var(--gl);color:var(--gr);border:1px solid #a5d6a7}
.is.er{background:#ffeaea;color:var(--re);border:1px solid #ef9a9a}

/* RECIPE */
.rc{background:#fff;border-radius:13px;padding:14px;margin-bottom:11px;box-shadow:0 2px 10px rgba(0,0,0,.07);border:1px solid var(--bo)}
.rb{margin-top:10px;padding-top:10px;border-top:1px solid var(--bo);display:none}
.rb.o{display:block}
.rb h4{font-size:.78rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.rb ul{padding-left:16px;margin-bottom:10px}
.rb ul li{font-size:.88rem;margin-bottom:2px}
.rb p{font-size:.88rem;line-height:1.65;white-space:pre-line}
.rbs{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.bo2{background:none;border:1.5px solid var(--bo);padding:4px 11px;border-radius:7px;font-size:.78rem;cursor:pointer;color:var(--mu);font-weight:600}
.bo2:active{background:var(--wa)}
.bog{border-color:var(--gr);color:var(--gr)}

/* COOK MODE */
#ck{position:fixed;inset:0;background:#1a1205;z-index:999;display:none;flex-direction:column}
#ck.s{display:flex}
.ch{background:#2d1f0a;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #3d2d0f;flex-shrink:0}
.ct{color:#f5c87a;font-size:1.1rem;font-weight:700;flex:1;margin-right:10px}
.cb{background:none;border:1px solid #5a3a10;color:#f5c87a;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.8rem}
.ckb{flex:1;overflow-y:auto;padding:18px}
.cs{color:#e07b39;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #3d2d0f}
.il{list-style:none;padding:0;margin-bottom:24px}
.il li{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #2d1f0a}
.il li:last-child{border-bottom:none}
.iq{color:#f5c87a;font-weight:700;min-width:100px;font-size:.97rem}
.in{color:#f0e0c8;font-size:.97rem}
.st2{background:#2d1f0a;border-radius:11px;padding:18px;margin-bottom:9px;border-left:4px solid var(--or);display:none}
.st2.ac{display:block}
.st2.sa{display:block}
.sl{color:#f5c87a;font-size:.78rem;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.sx{color:#f0e0c8;font-size:1.05rem;line-height:1.7}
.cf{background:#2d1f0a;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-top:2px solid #3d2d0f;flex-shrink:0}
.cn{background:var(--or);color:#fff;border:none;padding:11px 22px;border-radius:9px;font-size:.97rem;font-weight:700;cursor:pointer}
.cn:disabled{background:#3d2d0f;color:#5a4a2a;cursor:not-allowed}
.cp{color:#8a6a3a;font-size:.88rem}

/* EVENTS */
.eb{display:inline-block;background:var(--or);color:#fff;padding:2px 9px;border-radius:20px;font-size:.76rem;font-weight:600;margin-top:4px}
.dr{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bo)}
.dr:last-child{border-bottom:none}
.dc{width:18px;height:18px;accent-color:var(--gr);cursor:pointer;flex-shrink:0}
.dn{flex:1;font-size:.9rem}
.dn.t{text-decoration:line-through;color:var(--mu)}
.dw{font-size:.76rem;color:var(--gr);font-weight:600}
.adr{display:flex;gap:7px;margin-top:8px}
.adr input{flex:1;padding:7px 11px;border:1.5px solid var(--bo);border-radius:8px;font-size:.88rem;outline:none;font-family:inherit}
.adb{background:none;border:1.5px dashed var(--bo);width:100%;padding:7px;border-radius:8px;color:var(--mu);cursor:pointer;font-size:.86rem;margin-top:7px}
.adb:active{background:var(--wa)}

/* MY PAGE */
.wr{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.db{background:#fff;border-radius:9px;padding:7px 5px;border:1px solid var(--bo)}
.db.td{border-color:var(--or);background:#fff8f3}
.db h4{font-size:.68rem;font-weight:700;text-align:center;color:var(--mu);margin-bottom:5px;text-transform:uppercase}
.ml{font-size:.62rem;color:var(--mu);font-weight:600;text-transform:uppercase;margin-bottom:1px}
.me{background:var(--wa);border-radius:4px;padding:2px 5px;font-size:.68rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;word-break:break-word}
.ma{background:none;border:1px dashed var(--bo);width:100%;padding:2px;border-radius:4px;color:var(--mu);cursor:pointer;font-size:.62rem;margin-bottom:2px}
.ma:active{border-color:var(--or);color:var(--or)}

/* MINI MODAL */
.mm{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500}
.mm.h{display:none}
.mx{background:#fff;border-radius:15px;padding:22px;max-width:310px;width:90%;box-shadow:0 6px 28px rgba(0,0,0,.18)}
.mx h3{margin-bottom:12px;color:var(--or);font-size:.97rem}
.mx input{width:100%;padding:9px 13px;border:1.5px solid var(--bo);border-radius:9px;font-size:.92rem;margin-bottom:11px;outline:none;font-family:inherit}
.mx input:focus{border-color:var(--or)}
.mr2{display:flex;gap:8px;justify-content:flex-end}

@media(max-width:480px){.wr{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div id="loading">
  <h1>🍳</h1>
  <h1>Family Kitchen</h1>
  <p>Loading...</p>
</div>

<div id="nameModal" class="hidden">
  <div class="modal-box">
    <h2>🍳</h2>
    <h2>Family Kitchen</h2>
    <p>What's your name?</p>
    <input id="ni" type="text" placeholder="Enter your name..." maxlength="30">
    <button class="btn" id="jb" style="width:100%">Join the Kitchen 🍽️</button>
  </div>
</div>

<div class="mm h" id="mm">
  <div class="mx">
    <h3 id="mmt">Plan Meal</h3>
    <input id="mmi" type="text" placeholder="Meal name...">
    <div class="mr2">
      <button class="bsm bx" id="mmc">Cancel</button>
      <button class="bsm bg" id="mms">Save</button>
    </div>
  </div>
</div>

<div id="ck">
  <div class="ch">
    <div class="ct" id="ckt"></div>
    <div style="display:flex;gap:7px">
      <button class="cb" id="cka">📋 All Steps</button>
      <button class="cb" id="cke">✕ Exit</button>
    </div>
  </div>
  <div class="ckb" id="ckb"></div>
  <div class="cf">
    <button class="cn" id="ckp">← Prev</button>
    <span class="cp" id="ckpr"></span>
    <button class="cn" id="ckn">Next →</button>
  </div>
</div>

<header>
  <h1>🍳 Family Kitchen</h1>
  <div class="user-pill" id="up">👤 ...</div>
</header>
<nav>
  <button class="a" id="t-r">📖 Recipes</button>
  <button id="t-e">🗓️ Events</button>
  <button id="t-m">👤 My Page</button>
</nav>
<main>
  <div id="r" class="sec a">
    <div class="ib">
      <h3>🔗 Import Recipe from URL</h3>
      <div class="ir">
        <input id="iu" type="text" placeholder="Paste any recipe website URL...">
        <button class="btn" id="imb">✨ Import</button>
      </div>
      <div class="is" id="ist"></div>
    </div>
    <div class="af">
      <h3>➕ Add Recipe Manually</h3>
      <div class="fr">
        <input id="rn" type="text" placeholder="Recipe name">
        <input id="rc2" type="text" placeholder="Category (e.g. Mains, Desserts, Snacks)">
        <input id="ri" type="text" placeholder="Ingredients with quantities, comma-separated">
        <textarea id="rs" placeholder="Method — one step per line"></textarea>
        <button class="btn" id="arb">Save Recipe</button>
      </div>
    </div>
    <div class="st">📖 Family Recipes</div>
    <div id="rl"></div>
  </div>

  <div id="e" class="sec">
    <div class="af">
      <h3>➕ Add an Event</h3>
      <div class="fr">
        <input id="en" type="text" placeholder="Event name (e.g. Sunday BBQ 🔥)">
        <input id="ed" type="date">
        <input id="ex" type="text" placeholder="Notes (optional)">
        <button class="btn" id="aeb">Save Event</button>
      </div>
    </div>
    <div class="st">🗓️ Events</div>
    <div id="el"></div>
  </div>

  <div id="m" class="sec">
    <div id="mp"></div>
  </div>
</main>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA-JVr7hgGJZvlRWIA3RHWZ6SdzIkB5ngw",
  authDomain: "family-kitchen-628cb.firebaseapp.com",
  databaseURL: "https://family-kitchen-628cb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "family-kitchen-628cb",
  storageBucket: "family-kitchen-628cb.firebasestorage.app",
  messagingSenderId: "1033585168692",
  appId: "1:1033585168692:web:d0482fdfe9996c8c6c1561"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// State
var un = '', mealCtx = {}, cks = [], cki = 0, cka2 = false;
var recipes = [], events = [];
var D = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var DF = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function g(i){return document.getElementById(i)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ti(){var d=new Date().getDay();return d===0?6:d-1}
function fd(d){try{return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'long'});}catch(x){return d}}
function ls(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k));localStorage.setItem(k,JSON.stringify(v));}catch(x){return null}}

// Init
function init(){
  // Hide loading, show name modal if needed
  setTimeout(function(){
    g('loading').classList.add('hidden');
    var n = localStorage.getItem('fk_name');
    if(n){ un=n; g('nameModal').classList.add('hidden'); g('up').textContent='👤 '+n; }
    else { g('nameModal').classList.remove('hidden'); }
  }, 1500);

  // Listen for shared recipes
  db.ref('recipes').on('value', function(snap){
    recipes = [];
    snap.forEach(function(c){ recipes.push(c.val()); });
    recipes.reverse();
    rr();
  });

  // Listen for shared events
  db.ref('events').on('value', function(snap){
    events = [];
    snap.forEach(function(c){ events.push(c.val()); });
    re();
  });
}

// Name
function dj(){
  var v=g('ni').value.trim();
  if(!v){alert('Please enter your name!');return}
  un=v; localStorage.setItem('fk_name',v);
  g('nameModal').classList.add('hidden');
  g('up').textContent='👤 '+v;
}
g('jb').addEventListener('click', dj);
g('jb').addEventListener('touchend', function(e){e.preventDefault();dj()});
g('ni').addEventListener('keydown', function(e){if(e.key==='Enter'){e.preventDefault();dj()}});
g('up').addEventListener('click', function(){g('ni').value=un;g('nameModal').classList.remove('hidden')});
g('up').addEventListener('touchend', function(e){e.preventDefault();g('ni').value=un;g('nameModal').classList.remove('hidden')});

// Tabs
['r','e','m'].forEach(function(id){
  g('t-'+id).addEventListener('click',function(){
    ['r','e','m'].forEach(function(t){g(t).classList.remove('a');g('t-'+t).classList.remove('a')});
    g(id).classList.add('a');g('t-'+id).classList.add('a');
    if(id==='m')rm();
  });
});

// Import
g('imb').addEventListener('click', function(){
  var url=g('iu').value.trim(); if(!url)return;
  var st=g('ist'); st.className='is s ld'; st.textContent='⏳ Importing — please wait...';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:1500,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:'Find the recipe at this URL: '+url+'\n\nReturn ONLY raw JSON (no markdown, no code fences):\n{"name":"recipe name","cat":"Mains or Desserts or Breakfast or Snacks or Salads or Soups or Sides or Other","ings":["200g flour","2 eggs"],"steps":"Step one\\nStep two","src":"'+url+'"}\n\nEvery ingredient must have a quantity. If not found: {"error":"not found"}'}]
    })
  }).then(function(r){return r.json()}).then(function(d){
    var tx=d.content.filter(function(b){return b.type==='text'}).map(function(b){return b.text}).join('');
    var m=tx.match(/\{[\s\S]*\}/); if(!m) throw 0;
    var j=JSON.parse(m[0]);
    if(j.error){st.className='is s er';st.textContent='❌ Could not find recipe. Try a different URL or add manually.';return}
    var rec={id:'r'+Date.now(),name:j.name||'Imported Recipe',cat:j.cat||'General',by:un||'Family',src:j.src||url,ings:Array.isArray(j.ings)?j.ings:[],steps:j.steps||''};
    db.ref('recipes/'+rec.id).set(rec);
    st.className='is s ok'; st.textContent='✅ "'+rec.name+'" imported!'; g('iu').value='';
  }).catch(function(){st.className='is s er';st.textContent='❌ Import failed. Check the URL or add manually.'});
});

// Add recipe
g('arb').addEventListener('click', function(){
  var n=g('rn').value.trim(); if(!n){alert('Please enter a recipe name.');return}
  var rec={id:'r'+Date.now(),name:n,cat:g('rc2').value.trim()||'General',by:un||'Family',src:'',
    ings:g('ri').value.split(',').map(function(s){return s.trim()}).filter(Boolean),
    steps:g('rs').value.trim()};
  db.ref('recipes/'+rec.id).set(rec);
  ['rn','rc2','ri','rs'].forEach(function(i){g(i).value=''});
});

// Render recipes
function rr(){
  var el=g('rl');
  if(!recipes.length){el.innerHTML='<div class="emp"><span>📖</span>No recipes yet!</div>';return}
  el.innerHTML=recipes.map(function(r){
    return '<div class="rc">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<div style="flex:1"><b style="font-size:.98rem">'+esc(r.name)+'</b>'+
          '<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:4px">'+
            '<span class="tag">'+esc(r.cat)+'</span>'+
            '<span style="font-size:.76rem;color:var(--mu)">by '+esc(r.by)+'</span>'+
            (r.src?'<a href="'+esc(r.src)+'" target="_blank" style="font-size:.73rem;color:var(--bl)">🔗 source</a>':'')+
          '</div></div>'+
        '<button class="xb" data-dr="'+r.id+'">🗑</button></div>'+
      '<div class="rbs">'+
        '<button class="bo2" data-tr="'+r.id+'">▼ View</button>'+
        '<button class="bo2 bog" data-cr="'+r.id+'">👨‍🍳 Cook</button></div>'+
      '<div class="rb" id="rb'+r.id+'">'+
        (r.ings&&r.ings.length?'<h4>Ingredients</h4><ul>'+r.ings.map(function(i){return'<li>'+esc(i)+'</li>'}).join('')+'</ul>':'')+
        (r.steps?'<h4>Method</h4><p>'+esc(r.steps)+'</p>':'')+'</div></div>';
  }).join('');
}

// Cook mode
function pi(s){
  var m=s.match(/^([\d¼½¾⅓⅔\/\.\s]+\s*(?:g|kg|ml|l|L|tsp|tbsp|cups?|oz|lbs?|pinch|bunch|slices?|cans?|pieces?|cloves?|sprigs?|large|medium|small|whole)?\.?)\s*(.+)$/i);
  return m?{q:m[1].trim(),n:m[2].trim()}:{q:'',n:s};
}
function eck(rec){
  g('ckt').textContent='👨‍🍳 '+rec.name;
  var p=(rec.ings||[]).map(pi);
  var ih='<div style="margin-bottom:24px"><div class="cs">📦 Gather Your Ingredients</div>'+
    '<ul class="il">'+p.map(function(x){return'<li><span class="iq">'+(x.q?esc(x.q):'—')+'</span><span class="in">'+esc(x.n)+'</span></li>'}).join('')+'</ul></div>';
  cks=(rec.steps||'').split('\n').map(function(s){return s.trim()}).filter(Boolean);
  var sh='<div><div class="cs">👨‍🍳 Method</div><div id="ckw">'+
    cks.map(function(s,i){return'<div class="st2'+(i===0?' ac':'')+'" id="cks'+i+'"><div class="sl">Step '+(i+1)+' of '+cks.length+'</div><div class="sx">'+esc(s)+'</div></div>'}).join('')+'</div></div>';
  g('ckb').innerHTML=ih+sh; cki=0; cka2=false; g('cka').textContent='📋 All Steps'; uck(); g('ck').classList.add('s');
}
function uck(){g('ckp').disabled=cki===0;g('ckn').disabled=cki>=cks.length-1;g('ckpr').textContent='Step '+(cki+1)+' of '+cks.length}
function cnav(d){var o=g('cks'+cki);if(o&&!cka2)o.classList.remove('ac');cki=Math.max(0,Math.min(cks.length-1,cki+d));var c=g('cks'+cki);if(c){if(!cka2)c.classList.add('ac');c.scrollIntoView({behavior:'smooth',block:'nearest'})}uck()}
g('ckp').addEventListener('click',function(){cnav(-1)});
g('ckn').addEventListener('click',function(){cnav(1)});
g('cka').addEventListener('click',function(){cka2=!cka2;var w=g('ckw');if(!w)return;w.querySelectorAll('.st2').forEach(function(s){s.classList.toggle('sa',cka2)});g('cka').textContent=cka2?'📍 Step Mode':'📋 All Steps'});
g('cke').addEventListener('click',function(){g('ck').classList.remove('s')});

// Events
g('aeb').addEventListener('click',function(){
  var n=g('en').value.trim(); if(!n){alert('Enter an event name.');return}
  var ev={id:'e'+Date.now(),name:n,date:g('ed').value,desc:g('ex').value.trim(),dishes:[]};
  db.ref('events/'+ev.id).set(ev);
  ['en','ed','ex'].forEach(function(i){g(i).value=''});
});

function re(){
  var el=g('el');
  if(!events.length){el.innerHTML='<div class="emp"><span>🗓️</span>No events yet!</div>';return}
  var sorted=events.slice().sort(function(a,b){return(a.date||'9999')<(b.date||'9999')?-1:1});
  el.innerHTML=sorted.map(function(ev){
    var dishes=ev.dishes?Object.values(ev.dishes):[];
    return '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<div><b style="font-size:1rem">'+esc(ev.name)+'</b>'+
          (ev.date?'<br><span class="eb">📅 '+fd(ev.date)+'</span>':'')+
          (ev.desc?'<p style="font-size:.86rem;color:var(--mu);margin-top:5px">'+esc(ev.desc)+'</p>':'')+'</div>'+
        '<button class="xb" data-de="'+ev.id+'">🗑</button></div>'+
      '<div style="margin-top:12px">'+
        '<div style="font-size:.76rem;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:7px">Who\'s Bringing What</div>'+
        dishes.map(function(d){
          return '<div class="dr">'+
            '<input type="checkbox" class="dc"'+(d.by?' checked':'')+' data-dci="'+d.id+'" data-dev="'+ev.id+'">'+
            '<span class="dn'+(d.by?' t':'')+'">'+esc(d.name)+'</span>'+
            (d.by?'<span class="dw">✅ '+esc(d.by)+'</span>':'')+
            (!d.by?'<button class="xb" data-dd="'+d.id+'" data-dev="'+ev.id+'">🗑</button>':'')+'</div>';
        }).join('')+
        '<div class="adr" id="adr'+ev.id+'" style="display:none">'+
          '<input type="text" placeholder="e.g. Potato Salad">'+
          '<button class="bsm bg" data-dok="'+ev.id+'">Add</button>'+
          '<button class="bsm bx" data-dox="'+ev.id+'">✕</button></div>'+
        '<button class="adb" data-dao="'+ev.id+'">+ Add dish or item</button></div></div>';
  }).join('');
}

// My Page - stored locally per device (personal)
g('mmc').addEventListener('click',function(){g('mm').classList.add('h')});
g('mms').addEventListener('click',dsm);
g('mmi').addEventListener('keydown',function(e){if(e.key==='Enter')dsm()});
function dsm(){
  var v=g('mmi').value.trim(); if(!v)return;
  var k=mealCtx.d+'_'+mealCtx.s;
  var arr=ls(k)||[];
  if(!Array.isArray(arr))arr=[arr];
  arr.push(v); ls(k,arr);
  g('mm').classList.add('h'); rm();
}
function rm(){
  var t=ti(), n=un||'You';
  var w='<div class="wr">'+D.map(function(day,i){
    return '<div class="db'+(i===t?' td':'')+'"><h4>'+day+'</h4>'+
      [['🌅','B'],['☀️','L']].map(function(sl){
        var k=i+'_'+sl[1], arr=ls(k)||[];
        if(!Array.isArray(arr))arr=arr?[arr]:[];
        return '<div class="ml">'+sl[0]+'</div>'+
          arr.map(function(v,vi){return'<div class="me">'+esc(v.length>10?v.slice(0,10)+'…':v)+
            '<button class="xb" style="font-size:.6rem;padding:0 3px" data-cm="'+k+'" data-ci="'+vi+'">✕</button></div>'}).join('')+
          '<button class="ma" data-om="1" data-d="'+i+'" data-s="'+sl[1]+'">+</button>';
      }).join('')+'</div>';
  }).join('')+'</div>';

  var prForm='<div class="st" style="margin-top:4px">📒 My Private Recipes</div>'+
    '<div class="af"><h3>➕ Add Private Recipe</h3><div class="fr">'+
    '<input id="pn" type="text" placeholder="Recipe name">'+
    '<input id="pc" type="text" placeholder="Category">'+
    '<input id="pi2" type="text" placeholder="Ingredients with quantities, comma-separated">'+
    '<textarea id="ps" placeholder="Method — one step per line"></textarea>'+
    '<button class="btn" data-apr="1">Save My Recipe</button></div></div>';
  var myr=ls('fk_myr')||[];
  prForm+=(myr.length?myr.map(function(r){
    return '<div class="rc">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<div style="flex:1"><b style="font-size:.98rem">'+esc(r.name)+'</b>'+
          '<div style="margin-top:4px"><span class="tag">'+esc(r.cat)+'</span></div></div>'+
        '<div style="display:flex;gap:4px">'+
          '<button class="bsm bg" data-shr="'+r.id+'" style="font-size:.7rem">Share 📤</button>'+
          '<button class="xb" data-dpr="'+r.id+'">🗑</button></div></div>'+
      '<div class="rbs">'+
        '<button class="bo2" data-tp="'+r.id+'">▼ View</button>'+
        '<button class="bo2 bog" data-cp="'+r.id+'">👨‍🍳 Cook</button></div>'+
      '<div class="rb" id="prb'+r.id+'">'+
        (r.ings&&r.ings.length?'<h4>Ingredients</h4><ul>'+r.ings.map(function(i){return'<li>'+esc(i)+'</li>'}).join('')+'</ul>':'')+
        (r.steps?'<h4>Method</h4><p>'+esc(r.steps)+'</p>':'')+'</div></div>';
  }).join(''):'<div class="emp"><span>📒</span>No private recipes yet!</div>');

  g('mp').innerHTML='<div class="st">👤 '+esc(n)+'\'s Personal Plan</div>'+
    '<p style="font-size:.84rem;color:var(--mu);margin-bottom:13px">Your private breakfast & lunch plan for the week.</p>'+w+prForm;
}

// All click/change events
document.addEventListener('change',function(e){
  if(e.target.dataset.dci){
    if(!un){alert('Enter your name first!');e.target.checked=!e.target.checked;return}
    var eid=e.target.dataset.dev, did=e.target.dataset.dci;
    var ev=events.find(function(x){return x.id===eid}); if(!ev)return;
    var dishes=ev.dishes?Object.values(ev.dishes):[];
    var dish=dishes.find(function(d){return d.id===did}); if(!dish)return;
    if(dish.by&&dish.by!==un){alert(dish.by+' is already bringing this!');e.target.checked=false;return}
    dish.by=dish.by===un?'':un;
    db.ref('events/'+eid+'/dishes/'+did).update({by:dish.by});
  }
});

document.addEventListener('click',function(e){
  var t=e.target;
  var tr=t.closest('[data-tr]');if(tr){var b=g('rb'+tr.dataset.tr);b.classList.toggle('o');tr.textContent=b.classList.contains('o')?'▲ Hide':'▼ View';return}
  var tp=t.closest('[data-tp]');if(tp){var pb=g('prb'+tp.dataset.tp);pb.classList.toggle('o');tp.textContent=pb.classList.contains('o')?'▲ Hide':'▼ View';return}
  var dr=t.closest('[data-dr]');if(dr){if(!confirm('Remove?'))return;db.ref('recipes/'+dr.dataset.dr).remove();return}
  var dpr=t.closest('[data-dpr]');if(dpr){if(!confirm('Remove?'))return;var myr2=ls('fk_myr')||[];myr2=myr2.filter(function(r){return r.id!==dpr.dataset.dpr});ls('fk_myr',myr2);rm();return}
  var shr=t.closest('[data-shr]');if(shr){var myr3=ls('fk_myr')||[];var sr=myr3.find(function(r){return r.id===shr.dataset.shr});if(!sr)return;db.ref('recipes/'+sr.id).set(sr);myr3=myr3.filter(function(r){return r.id!==sr.id});ls('fk_myr',myr3);rm();alert('"'+sr.name+'" shared! 🎉');return}
  var cr=t.closest('[data-cr]');if(cr){var rec=recipes.find(function(r){return r.id===cr.dataset.cr});if(rec)eck(rec);return}
  var cp=t.closest('[data-cp]');if(cp){var myr4=ls('fk_myr')||[];var pr=myr4.find(function(r){return r.id===cp.dataset.cp});if(pr)eck(pr);return}
  var de=t.closest('[data-de]');if(de){if(!confirm('Remove event?'))return;db.ref('events/'+de.dataset.de).remove();return}
  var dd=t.closest('[data-dd]');if(dd){db.ref('events/'+dd.dataset.dev+'/dishes/'+dd.dataset.dd).remove();return}
  var dao=t.closest('[data-dao]');if(dao){var row=g('adr'+dao.dataset.dao);if(row){row.style.display='flex';var inp=row.querySelector('input');if(inp)inp.focus()}return}
  var dox=t.closest('[data-dox]');if(dox){var row2=g('adr'+dox.dataset.dox);if(row2){row2.style.display='none';var inp2=row2.querySelector('input');if(inp2)inp2.value=''}return}
  var dok=t.closest('[data-dok]');if(dok){
    var eid2=dok.dataset.dok, row3=g('adr'+eid2); if(!row3)return;
    var inp3=row3.querySelector('input'); if(!inp3||!inp3.value.trim())return;
    var did2='d'+Date.now();
    db.ref('events/'+eid2+'/dishes/'+did2).set({id:did2,name:inp3.value.trim(),by:''});
    inp3.value=''; row3.style.display='none'; return}
  var om=t.closest('[data-om]');if(om){mealCtx={d:parseInt(om.dataset.d),s:om.dataset.s};g('mmt').textContent='Plan '+(om.dataset.s==='B'?'Breakfast':'Lunch')+' — '+DF[parseInt(om.dataset.d)];g('mmi').value='';g('mm').classList.remove('h');setTimeout(function(){g('mmi').focus()},80);return}
  var cm=t.closest('[data-cm]');if(cm){var k=cm.dataset.cm,ci=parseInt(cm.dataset.ci);var arr2=ls(k)||[];if(Array.isArray(arr2)){arr2.splice(ci,1);if(!arr2.length)localStorage.removeItem(k);else ls(k,arr2)}rm();return}
  var apr=t.closest('[data-apr]');if(apr){var pn=g('pn').value.trim();if(!pn){alert('Enter a recipe name.');return}var prec={id:'pr'+Date.now(),name:pn,cat:g('pc').value.trim()||'General',by:un||'Me',src:'',ings:g('pi2').value.split(',').map(function(s){return s.trim()}).filter(Boolean),steps:g('ps').value.trim()};var myr5=ls('fk_myr')||[];myr5.unshift(prec);ls('fk_myr',myr5);['pn','pc','pi2','ps'].forEach(function(i){g(i).value=''});rm();return}
});
